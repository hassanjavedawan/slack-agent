display_information:
  name: Relymer
  description: AI assistant for your Slack workspace
  background_color: "#1a1a2e"
  long_description: |
    Relymer is an AI-powered assistant that lives in your Slack workspace.
    It can run tasks, answer questions, manage integrations, and automate
    workflows — all from Slack. Powered by Gemini.

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Relymer
    always_online: true

oauth_config:
  redirect_urls:
    - https://apislack.relymer.com/slack/oauth/callback
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:join
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - reactions:read
      - reactions:write
      - users:read
      - team:read

settings:
  event_subscriptions:
    request_url: https://apislack.relymer.com/slack/events

    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
    request_url: https://apislack.relymer.com/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
